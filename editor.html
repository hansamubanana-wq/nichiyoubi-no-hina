<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>マップエディタ — 日曜日の陽菜</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #11151b;
        font-family: "Yu Gothic UI", "Hiragino Sans", sans-serif; color: #e7e3d8; }
      #scene { position: fixed; inset: 0; width: 100%; height: 100%; }
      #panel {
        position: fixed; top: 0; left: 0; width: 300px; height: 100%;
        background: rgba(16, 20, 26, 0.93); border-right: 1px solid #2c3440;
        overflow-y: auto; padding: 14px; z-index: 10; backdrop-filter: blur(4px);
      }
      #panel h2 { font-size: 1rem; letter-spacing: 0.1em; margin-bottom: 10px; color: #c8a96a; }
      .section { margin-bottom: 16px; border-bottom: 1px solid #232b35; padding-bottom: 12px; }
      .section h3 { font-size: 0.78rem; color: #8b97a6; letter-spacing: 0.08em; margin-bottom: 8px; font-weight: 600; }
      .row { display: flex; gap: 6px; }
      .row.wrap { flex-wrap: wrap; }
      .col { display: flex; flex-direction: column; gap: 6px; }
      button, select, input[type="file"] {
        font-family: inherit; font-size: 0.8rem; color: #e7e3d8; background: #1d242e;
        border: 1px solid #344050; border-radius: 6px; padding: 7px 9px; cursor: pointer;
        transition: all 0.15s ease;
      }
      button:hover { background: #28323e; border-color: #4a90d9; }
      button.on { background: #2e4a6a; border-color: #4a90d9; }
      button.primary { background: #2f5d3a; border-color: #4a9d5f; }
      button.danger { background: #5d2f2f; border-color: #9d4a4a; }
      button.pal { font-size: 0.74rem; padding: 6px 8px; }
      select { width: 100%; }
      .palette .pal-group { font-size: 0.72rem; color: #6c7787; margin: 8px 0 4px; }
      .info { font-size: 0.78rem; line-height: 1.7; color: #cfd6df; background: #161c24;
        padding: 8px 10px; border-radius: 6px; word-break: break-all; }
      .info .tag { background: #2e4a6a; padding: 1px 6px; border-radius: 4px; font-size: 0.7rem; }
      .list { max-height: 220px; overflow-y: auto; }
      .list-item { font-size: 0.76rem; padding: 5px 8px; border-radius: 4px; cursor: pointer; color: #b9c2cd; }
      .list-item:hover { background: #1d242e; }
      .list-item.sel { background: #2e4a6a; color: #fff; }
      .list-item.removed { text-decoration: line-through; opacity: 0.45; }
      #status {
        position: fixed; bottom: 0; left: 300px; right: 0; padding: 8px 14px;
        background: rgba(16, 20, 26, 0.92); border-top: 1px solid #2c3440;
        font-size: 0.78rem; color: #9fb0c0; z-index: 10;
      }
      #help {
        position: fixed; top: 10px; right: 12px; z-index: 10; text-align: right;
        font-size: 0.72rem; color: #6c7787; line-height: 1.6;
        background: rgba(16,20,26,0.7); padding: 8px 12px; border-radius: 8px;
      }
      #help b { color: #c8a96a; }
    </style>
  </head>
  <body>
    <canvas id="scene"></canvas>
    <div id="panel"><h2>マップエディタ</h2></div>
    <div id="status">準備中…</div>
    <div id="help">
      <b>操作</b><br>
      ドラッグ: 視点回転 / ホイール: ズーム<br>
      クリック: 選択 ・ W移動 E回転 R拡縮 ・ Del削除<br>
      <a href="/" style="color:#4a90d9">▸ ゲームに戻る</a>
    </div>
    <script type="module" src="/src/editor/main.js"></script>
  </body>
</html>
